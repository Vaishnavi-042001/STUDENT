<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-gradient">👥 Candidates</h1>
            <a href="/" class="btn btn-outline-secondary">🏠 Home</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover table-striped">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Skills</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${candidates}">
                            <td th:text="${c.id}">1</td>
                            <td th:text="${c.name}">Alice</td>
                            <td th:text="${c.email}">alice@example.com</td>
                            <td th:text="${c.skills}">Java, Spring</td>
                        </tr>
                    </tbody>
                </table>
                <a href="/" class="btn btn-success rounded-pill px-4">➕ Add New Candidate</a>
            </div>
        </div>
    </div>
</body>
</html>
