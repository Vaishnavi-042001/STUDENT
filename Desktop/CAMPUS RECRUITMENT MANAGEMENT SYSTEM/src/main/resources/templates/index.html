<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🏫 Campus Recruitment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container py-5">
        <div class="card shadow-lg border-0 rounded-4 p-4" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            <h1 class="text-white display-3 fw-bold text-center">🎓 Campus Recruitment</h1>
            <p class="text-white text-center fs-5">Manage candidates and job openings with a splash of color!</p>
        </div>
        <div class="row mt-5 g-4">
            <div class="col-md-6">
                <a href="/candidates" class="text-decoration-none">
                    <div class="card h-100 shadow-lg border-0 rounded-4" style="background: linear-gradient(145deg, #a18cd1, #fbc2eb);">
                        <div class="card-body text-center py-5">
                            <h2 class="display-4">👥 Candidates</h2>
                            <p class="lead">View all candidates and add new ones</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="/jobs" class="text-decoration-none">
                    <div class="card h-100 shadow-lg border-0 rounded-4" style="background: linear-gradient(145deg, #ffecd2, #fcb69f);">
                        <div class="card-body text-center py-5">
                            <h2 class="display-4">💼 Jobs</h2>
                            <p class="lead">Browse job postings and create new ones</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
